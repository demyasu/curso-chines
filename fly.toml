[fly]
  app = "curso-chines"
  primary_region = "ord"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.conditions]]
    port = 80

  [[services.conditions]]
    port = 443

  [[services.handlers]]
    handler = "tls"

  [[services.handlers]]
    handler = "http"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.tcp_checks]
    interval = "10s"
    timeout = "2s"

  [services.http_checks]
    path = "/health"
    interval = "15s"
    timeout = "2s"
    restart_limit = 3

[deploy]
  release_command = "npm run migrate || true"

[processes]
  web = "node server.js"